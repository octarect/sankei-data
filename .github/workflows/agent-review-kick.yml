name: Agent Review Kick (PR labeled)

on:
  pull_request:
    types: [labeled]

permissions:
  pull-requests: write

jobs:
  review-kick:
    name: Post agent review instruction comment
    runs-on: ubuntu-latest
    if: github.event.label.name == 'agent:review'
    steps:
      - uses: actions/checkout@v4

      - name: Post Copilot review instruction
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/workflows/scripts/agent-review-kick.js');
            await script({ github, context });
